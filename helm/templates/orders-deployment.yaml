apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: {{ .Values.namespace }}
  labels:
    app: orders
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
        - name: orders
          image: "{{ .Values.orders.image }}:{{ .Values.orders.tag }}"
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: "{{ .Values.orders.resources.requests.cpu }}"
              memory: "{{ .Values.orders.resources.requests.memory }}"
            limits:
              cpu: "{{ .Values.orders.resources.limits.cpu }}"
              memory: "{{ .Values.orders.resources.limits.memory }}"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
