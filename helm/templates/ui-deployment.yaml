apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: {{ .Values.namespace }}
  labels:
    app: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: "{{ .Values.ui.image }}:{{ .Values.ui.tag }}"
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: RETAIL_UI_ENDPOINTS_CATALOG
              value: "http://catalog:8080"
            - name: RETAIL_UI_ENDPOINTS_CARTS
              value: "http://cart:8080"
            - name: RETAIL_UI_ENDPOINTS_CHECKOUT
              value: "http://checkout:8080"
            - name: RETAIL_UI_ENDPOINTS_ORDERS
              value: "http://orders:8080"
          resources:
            requests:
              cpu: "{{ .Values.ui.resources.requests.cpu }}"
              memory: "{{ .Values.ui.resources.requests.memory }}"
            limits:
              cpu: "{{ .Values.ui.resources.limits.cpu }}"
              memory: "{{ .Values.ui.resources.limits.memory }}"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 5
