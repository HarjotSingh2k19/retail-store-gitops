apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  labels:
    app: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: "{{ .Values.ui.image }}:{{ .Values.ui.tag }}"
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: RETAIL_UI_ENDPOINTS_CATALOG
              value: "http://catalog:8080"
            - name: RETAIL_UI_ENDPOINTS_CARTS
              value: "http://cart:8080"
            - name: RETAIL_UI_ENDPOINTS_CHECKOUT
              value: "http://checkout:8080"
            - name: RETAIL_UI_ENDPOINTS_ORDERS
              value: "http://orders:8080"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15